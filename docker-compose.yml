# ──────────────────────────────────────────────────────────────────
# ReportForge Enterprise — Docker Compose
# Services: API server + optional Redis cache
# ──────────────────────────────────────────────────────────────────
version: "3.9"

services:

  # ── ReportForge API ──────────────────────────────────────────
  reportforge:
    build:
      context: .
      dockerfile: Dockerfile
    image: reportforge:2.0.0
    container_name: reportforge-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      RF_HOST:     "0.0.0.0"
      RF_PORT:     "8000"
      RF_WORKERS:  "2"
      RF_RELOAD:   "false"
      # Tenant environment overrides (optional)
      # RF_THEME_ACME: "ocean"
      # COMPANY_NAME: "My Company"
    volumes:
      # Mount your layouts directory (read-only in production)
      - ./reportforge/layouts:/app/layouts:ro
      - ./reportforge/examples:/app/examples:ro
      # Writable tenant themes (can be managed via API)
      - rf_themes:/app/reportforge/server/themes
      - rf_templates:/app/reportforge/server/templates_registry
      # Output directory (optional — for debugging)
      - rf_output:/app/output
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout:  10s
      retries:  3
      start_period: 20s
    networks:
      - rf_net

  # ── Nginx reverse proxy (optional, uncomment for production) ──
  # nginx:
  #   image: nginx:alpine
  #   container_name: reportforge-nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./certs:/etc/nginx/certs:ro
  #   depends_on:
  #     - reportforge
  #   networks:
  #     - rf_net

volumes:
  rf_themes:
  rf_templates:
  rf_output:

networks:
  rf_net:
    driver: bridge
