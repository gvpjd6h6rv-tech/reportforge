<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReportForge Designer</title>
  <link rel="stylesheet" href="designer.css">
</head>
<body>

<div id="app">

  <!-- ── Toolbar ────────────────────────────────────────────────── -->
  <div id="toolbar"></div>

  <!-- ── Workspace (3 columns) ──────────────────────────────────── -->
  <div id="workspace">

    <!-- Left: Field Explorer -->
    <div id="field-explorer"></div>

    <!-- Center: Canvas Area (rulers + scrollable surface) -->
    <div id="canvas-area">
      <div id="ruler-corner"></div>
      <div id="ruler-h"><canvas></canvas></div>
      <div id="ruler-v"><canvas></canvas></div>
      <div id="canvas-scroll">
        <div id="canvas-surface">
          <!-- Sections + elements rendered here by JS -->
        </div>
      </div>
    </div>

    <!-- Right: Property Inspector -->
    <div id="property-inspector"></div>

  </div><!-- /workspace -->

  <!-- ── Status Bar ─────────────────────────────────────────────── -->
  <div id="statusbar">
    <span id="statusbar-msg">Loading…</span>
    <span id="statusbar-sel"></span>
    <span id="statusbar-dirty"></span>
    <span id="statusbar-coord">X:0  Y:0</span>
  </div>

</div><!-- /app -->

<!-- ══════════════════════════════════════════════════════════════
     Module scripts — ORDER MATTERS
     ══════════════════════════════════════════════════════════════ -->

<!-- 1. Core: EventBus · AppState · Utils -->
<script src="core.js"></script>

<!-- 2. History (before any mutations) -->
<script src="history/history.js"></script>

<!-- 3. Layout tools -->
<script src="layout_tools/serializer.js"></script>
<script src="layout_tools/alignment.js"></script>

<!-- 4. Elements -->
<script src="elements/element_factory.js"></script>

<!-- 5. Interaction -->
<script src="interaction/snap.js"></script>
<script src="interaction/selection.js"></script>
<script src="interaction/drag.js"></script>
<script src="interaction/keyboard.js"></script>

<!-- 6. Canvas -->
<script src="canvas/canvas.js"></script>

<!-- 7. Sections (depends on ElementFactory + Selection) -->
<script src="sections/sections.js"></script>

<!-- 8. Panels -->
<script src="inspector/property_inspector.js"></script>
<script src="explorer/field_explorer.js"></script>
<script src="toolbar/toolbar.js"></script>

<!-- 9. Main App (boots everything) -->
<script src="app.js"></script>

<!-- ── Selection status bar update ─────────────────────────────── -->
<script>
RF.EventBus.on('selection:changed', () => {
  const n   = RF.AppState.selectedIds.size;
  const sel = document.getElementById('statusbar-sel');
  if (sel) sel.textContent = n ? `${n} selected` : '';
});

RF.EventBus.on('layout:changed', () => {
  const d = document.getElementById('statusbar-dirty');
  if (d) d.textContent = RF.AppState.isDirty ? '● Unsaved' : '';
});

// Ctrl+S → save
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 's') {
    e.preventDefault();
    RF.Serializer.download();
  }
});
</script>

</body>
</html>
